name: "docker: Build and push ghcr.io/12urenloop/dedenker:latest"

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/12urenloop/dedenker

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          tags: ${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:latest-${{ github.sha }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
